apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: photo-ns
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
 
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: photo-ns
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
  type: NodePort
